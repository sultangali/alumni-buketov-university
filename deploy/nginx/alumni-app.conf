# Shared app-serving rules for the Alumni Hall of Fame.
# Installed at /etc/nginx/snippets/alumni-app.conf and `include`d by BOTH the
# public-domain server block and the local-IP (kiosk) server block, so the two
# entry points serve the exact same site and backend.
#
# The frontend is built with VITE_API_URL='' (same-origin), so /api and /media
# below resolve against whichever host the page was opened from (domain or IP).

root /var/www/alumni;
index index.html;

# upload size cap (matches the API's 25MB media limit, + headroom)
client_max_body_size 30m;

gzip on;
gzip_types text/css application/javascript application/json image/svg+xml;
gzip_min_length 1024;

add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options SAMEORIGIN always;
add_header Referrer-Policy strict-origin-when-cross-origin always;

# hashed Vite assets — cache hard
location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

# API -> Node backend on localhost
location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# uploaded media -> Node backend on localhost
location /media/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# SPA fallback (the app routes in memory, no server routes)
location / {
    try_files $uri $uri/ /index.html;
}
