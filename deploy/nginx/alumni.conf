# ============================================================================
#  Alumni Hall of Fame — nginx (single file, ready to use)
#
#  Server LAN IP (kiosk) : 192.168.42.40
#  Server external IP    : 188.0.155.190   (domain A-record points here)
#  Domain                : alumni.buketov.edu.kz
#  Static frontend       : /var/www/alumni   (copy the Vite `dist/` contents here)
#  Backend (Node)        : 127.0.0.1:4000
#
#  Install:
#    sudo cp alumni.conf /etc/nginx/sites-available/alumni.conf
#    sudo ln -sf /etc/nginx/sites-available/alumni.conf /etc/nginx/sites-enabled/alumni.conf
#    sudo rm -f /etc/nginx/sites-enabled/default
#    sudo nginx -t && sudo systemctl reload nginx
#  TLS for the domain (after DNS points to 188.0.155.190):
#    sudo certbot --nginx -d alumni.buketov.edu.kz
#
#  Two ways in, same site, same backend:
#    Public:  https://alumni.buketov.edu.kz
#    Kiosk:   http://192.168.42.40/        (LAN, plain HTTP, ?preview=kiosk)
# ============================================================================


# ---- 1) PUBLIC SITE — the university domain --------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name alumni.buketov.edu.kz;

    root /var/www/alumni;
    index index.html;

    # matches the API's 25MB media upload limit + headroom
    client_max_body_size 30m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # hashed Vite assets — cache hard
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API -> Node backend
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # uploaded media -> Node backend
    location /media/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback (the app routes in memory)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # `sudo certbot --nginx -d alumni.buketov.edu.kz` adds the `listen 443 ssl`
    # block and the HTTP->HTTPS redirect to this server block automatically.
}


# ---- 2) LOCAL / KIOSK ACCESS — by server IP --------------------------------
# default_server answers everything that is NOT the domain above: the LAN IP
# 192.168.42.40 (the info-kiosk) and the external IP 188.0.155.190 by raw IP.
# Plain HTTP, no redirect — the kiosk keeps working on the university network
# even with no internet and no TLS certificate.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 192.168.42.40 188.0.155.190 _;

    root /var/www/alumni;
    index index.html;

    client_max_body_size 30m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
